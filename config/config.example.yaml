# =============================================================================
# dd-frame 配置模板
#
# 使用方式：
#   cp config/config.example.yaml config/config.yaml
#   然后按需修改 config.yaml 中的配置项
#
# 环境变量覆盖：
#   所有配置项支持 DD_ 前缀的环境变量覆盖
#   例：DD_DATABASE_HOST=192.168.1.100  →  database.host = 192.168.1.100
#        DD_REDIS_PASSWORD=secret       →  redis.password = secret
# =============================================================================

# ---------------------------------------------------------------------------
# 服务器配置
# ---------------------------------------------------------------------------
server:
  http_port: 8080          # Gin HTTP 服务端口
  grpc_port: 8081          # Connect gRPC 服务端口（预留）
  mode: debug              # 运行模式：debug / release / test
                           #   debug  — 开发环境，输出详细日志
                           #   release — 生产环境，关闭调试信息
                           #   test   — 测试模式

# ---------------------------------------------------------------------------
# 数据库配置（GORM + MySQL）
# ---------------------------------------------------------------------------
database:
  driver: mysql            # 数据库驱动（目前仅支持 mysql）
  host: 127.0.0.1          # 数据库主机地址
  port: 3306               # 数据库端口
  dbname: ddframe          # 数据库名称
  user: root               # 数据库用户名
  password: ""             # 数据库密码（生产环境建议通过环境变量设置）

# ---------------------------------------------------------------------------
# Redis 配置（分布式锁 & 缓存）
# ---------------------------------------------------------------------------
redis:
  addr: 127.0.0.1:6379     # Redis 地址（host:port）
  password: ""             # Redis 密码（无密码留空）
  db: 0                    # Redis 数据库编号（0-15）

# ---------------------------------------------------------------------------
# JWT 鉴权配置
# ---------------------------------------------------------------------------
jwt:
  secret: "change-me-in-production"  # JWT 签名密钥（生产环境必须修改！）
  expires_in: 24                      # Token 有效期（小时）

# ---------------------------------------------------------------------------
# RBAC 权限配置
# ---------------------------------------------------------------------------
rbac:
  seed_enabled: true       # 是否启用种子数据初始化（首次启动创建 admin 角色/用户）

# ---------------------------------------------------------------------------
# 日志配置（Zap）
# ---------------------------------------------------------------------------
log:
  level: debug             # 日志级别：debug / info / warn / error
  format: console          # 输出格式：
                           #   console — 人类可读格式（开发环境推荐）
                           #   json    — JSON 结构化格式（生产环境推荐）

# ---------------------------------------------------------------------------
# 分布式追踪配置（OpenTelemetry）
# ---------------------------------------------------------------------------
tracing:
  enabled: false           # 是否启用分布式追踪
  service_name: dd-frame   # 服务名称（用于 Jaeger/Tempo 显示）
  endpoint: ""             # OTLP HTTP endpoint（如 localhost:4318）
                           # 留空时使用默认 OTLP endpoint
  insecure: true           # 开发环境跳过 TLS（生产环境设为 false）

# ---------------------------------------------------------------------------
# Prometheus 指标配置
# ---------------------------------------------------------------------------
metrics:
  enabled: false           # 是否启用 Prometheus 指标端点
  path: /metrics           # 指标暴露路径

# ---------------------------------------------------------------------------
# 请求限流配置
# ---------------------------------------------------------------------------
ratelimit:
  enabled: false           # 是否启用请求限流
  rate: 100                # 每秒请求数上限
  burst: 200               # 突发上限
  backend: memory          # 限流后端：memory / redis
  key_prefix: "rl:"        # Redis key 前缀（仅 redis 后端生效）

# ---------------------------------------------------------------------------
# 文件存储配置
# ---------------------------------------------------------------------------
storage:
  driver: ""               # 存储驱动：local / oss（留空禁用）
  local:
    base_dir: ./uploads    # 本地存储目录
    base_url: /uploads     # 访问 URL 前缀
  oss:
    endpoint: ""           # OSS Endpoint（如 oss-cn-hangzhou.aliyuncs.com）
    access_key_id: ""      # 阿里云 AccessKey ID
    access_key_secret: ""  # 阿里云 AccessKey Secret
    bucket: ""             # Bucket 名称
    prefix: ""             # 对象 key 前缀
    cdn_url: ""            # CDN 加速域名（可选）
