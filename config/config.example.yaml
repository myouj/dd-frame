# =============================================================================
# dd-frame 配置模板
#
# 使用方式：
#   cp config/config.example.yaml config/config.yaml
#   然后按需修改 config.yaml 中的配置项
#
# 环境变量覆盖：
#   所有配置项支持 DD_ 前缀的环境变量覆盖
#   例：DD_DATABASE_HOST=192.168.1.100  →  database.host = 192.168.1.100
#        DD_REDIS_PASSWORD=secret       →  redis.password = secret
# =============================================================================

# ---------------------------------------------------------------------------
# 服务器配置
# ---------------------------------------------------------------------------
server:
  http_port: 8080          # Gin HTTP 服务端口
  grpc_port: 8081          # Connect gRPC 服务端口（预留）
  mode: debug              # 运行模式：debug / release / test
                           #   debug  — 开发环境，输出详细日志
                           #   release — 生产环境，关闭调试信息
                           #   test   — 测试模式

# ---------------------------------------------------------------------------
# 数据库配置（GORM + MySQL）
# ---------------------------------------------------------------------------
database:
  driver: mysql            # 数据库驱动（目前仅支持 mysql）
  host: 127.0.0.1          # 数据库主机地址
  port: 3306               # 数据库端口
  dbname: ddframe          # 数据库名称
  user: root               # 数据库用户名
  password: ""             # 数据库密码（生产环境建议通过环境变量设置）

# ---------------------------------------------------------------------------
# Redis 配置（分布式锁 & 缓存）
# ---------------------------------------------------------------------------
redis:
  addr: 127.0.0.1:6379     # Redis 地址（host:port）
  password: ""             # Redis 密码（无密码留空）
  db: 0                    # Redis 数据库编号（0-15）

# ---------------------------------------------------------------------------
# JWT 鉴权配置
# ---------------------------------------------------------------------------
jwt:
  secret: "change-me-in-production"  # JWT 签名密钥（生产环境必须修改！）
  expires_in: 24                      # Token 有效期（小时）

# ---------------------------------------------------------------------------
# 日志配置（Zap）
# ---------------------------------------------------------------------------
log:
  level: debug             # 日志级别：debug / info / warn / error
  format: console          # 输出格式：
                           #   console — 人类可读格式（开发环境推荐）
                           #   json    — JSON 结构化格式（生产环境推荐）
